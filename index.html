<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT9 Q4 Seatwork</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:rgb(19, 45, 76) ;
    font-family:Arial, sans-serif;
}

.login-box{
    width:350px;
    margin:80px auto;
    padding:30px;
    background:rgb(232, 226, 226);
    border:6px solid #3d5183;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.icon{
    font-size:50px;
    text-align:center;
}

h2{
    text-align:center;
    color:#253c78;
}

.instructions{
    display:none;
    margin-top:15px;
    font-size:14px;
    color:#555;
}

a{
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">

<h2>LOGIN</h2>

<form>
<label>Username</label>
<input type="text" id="user" class="form-control mb-3" placeholder="Enter username">

<label>Password</label>
<input type="password" id="pass" class="form-control mb-3" placeholder="Enter password">

<div class="form-check mb-3">
<input type="checkbox" class="form-check-input">
<label class="form-check-label">Stay logged in</label>
</div>

<div class="d-flex gap-2">
<button type="button" class="btn btn-primary w-50" onclick="login()">Login</button>
<button type="reset" class="btn btn-secondary w-50">Cancel</button>
</div>

<hr>

<div class="text-center">
<a href="#">Forgot username / password?</a>
</div>


<div class="instructions" id="guide">
Use username: <b>username </b><br>
Use password: <b>1234</b>
</div>

</form>
</div>

<script>
function login(){

let username = document.getElementById("user").value;
let password = document.getElementById("pass").value;

if(username == "username" && password == "1234"){
    alert("Welcome " + username + "!");
}
else{
    alert("Incorrect username or password.");
}

}


if(text.style.display == "none"){
    text.style.display = "block";
}
else{
    text.style.display = "none";
}

</script>

</body>
</html>
